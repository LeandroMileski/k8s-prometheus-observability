apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nginx-alerts
  namespace: java-mysql
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: nginx
      rules:
        - alert: NginxHighErrorRate
          expr: >
            sum(rate(nginx_ingress_controller_requests{status=~"4.."}[5m]))
            / sum(rate(nginx_ingress_controller_requests[5m])) > 0.05
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "High 4xx error rate on Nginx Ingress"
            description: "More than 5% of requests are returning 4xx status codes."