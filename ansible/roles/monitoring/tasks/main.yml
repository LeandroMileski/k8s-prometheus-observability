# ansible/roles/monitoring/tasks/main.yml
---
- name: Install kubernetes Python library (system package)
  ansible.builtin.apt:
    name:
      - python3-kubernetes
    state: present
    update_cache: true
  become: true

- name: Create monitoring namespace
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ monitoring_namespace }}"

- name: Check for helm binary
  ansible.builtin.command: helm version
  register: helm_check
  changed_when: false
  failed_when: false

- name: Install helm
  ansible.builtin.shell: >
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    | bash
  when: helm_check.rc != 0
  changed_when: true

- name: Add prometheus-community Helm repository
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: "https://prometheus-community.github.io/helm-charts"
    kubeconfig: "{{ kubeconfig }}"

- name: Deploy kube-prometheus-stack
  kubernetes.core.helm:
    name: "{{ prometheus_release_name }}"
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: "{{ monitoring_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
    create_namespace: false
    wait: true
    values:
      grafana:
        service:
          type: NodePort
      prometheus:
        service:
          type: NodePort
      alertmanager:
        service:
          type: NodePort
        config:
          global:
            smtp_smarthost: "smtp.sendgrid.net:2525"
            smtp_from: "leandrotinoco55@gmail.com"
            smtp_auth_username: "apikey"
            smtp_auth_password: "{{ sendgrid_api_key }}"
            smtp_require_tls: true
          route:
            group_by: ["alertname", "severity"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
            receiver: email
            routes:
              - match:
                  severity: critical
                receiver: email
              - match:
                  severity: warning
                receiver: email
          receivers:
            - name: email
              email_configs:
                - to: "leandrotinoco55@gmail.com"
                  send_resolved: true

- name: Ensure remote manifest directory exists
  ansible.builtin.file:
    path: "{{ k8s_remote_dir }}"
    state: directory
    mode: "0755"

- name: Copy manifests to control plane
  ansible.builtin.copy:
    src: "{{ k8s_local_dir }}/"
    dest: "{{ k8s_remote_dir }}/"
    mode: "0644"

- name: Create app namespace for ServiceMonitor
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ app_namespace }}"

- name: Apply Service monitor
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig }}
    apply -f {{ k8s_remote_dir }}/{{ item }}
  loop:
    - java-servicemonitor.yaml
  register: apply_java
  changed_when: "'unchanged' not in apply_java.stdout"

- name: Apply alerts
  ansible.builtin.command: >
    kubectl --kubeconfig {{ kubeconfig }}
    apply -f {{ k8s_remote_dir }}/alerts/{{ item }}
  loop:
    - nginx-alerts.yaml
    - mysql-alerts.yaml
    - java-alerts.yaml
  register: apply_alerts
  changed_when: "'unchanged' not in apply_alerts.stdout"