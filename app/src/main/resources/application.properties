# The ${VAR:default} syntax reads an environment variable, falling back to the
# default for local runs. In Kubernetes, the ConfigMap and Secret supply these.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:team_app}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.port=8080
